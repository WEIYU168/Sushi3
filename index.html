<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東坡行旅 - 貶謫路線互動地圖</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f0ebe5;
        }
        
        .font-calligraphy {
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 3px;
        }
        
        /* Quiz Animation */
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // 页面加载提示
        console.log('=== 東坡行旅游戏已加载 ===');
        console.log('提示：如需使用背景音乐和个性化地图，请确保文件与index.html在同一目录');

        // 音效工具函數
        let globalAudioCtx = null;

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                if (!globalAudioCtx) {
                    globalAudioCtx = new AudioContext();
                }
                const ctx = globalAudioCtx;
                
                if (ctx.state === 'suspended') {
                    ctx.resume().catch(e => console.log("Audio resume blocked"));
                }

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'win') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                } else if (type === 'tick') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'firework') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                }
            } catch (e) {
                // Ignore audio errors
            }
        };

        const Fireworks = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationId;

                const createParticle = (x, y, color) => {
                    const particleCount = 30;
                    playSound('firework');
                    
                    for (let i = 0; i < particleCount; i++) {
                        particles.push({
                            x, y,
                            color,
                            radius: Math.random() * 3 + 1,
                            velocity: {
                                x: (Math.random() - 0.5) * 8,
                                y: (Math.random() - 0.5) * 8
                            },
                            life: 100,
                            alpha: 1
                        });
                    }
                };

                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 

                    particles.forEach((p, index) => {
                        if (p.life > 0) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                            ctx.fill();
                            p.x += p.velocity.x;
                            p.y += p.velocity.y;
                            p.life--;
                            p.alpha -= 0.01;
                        } else {
                            particles.splice(index, 1);
                        }
                    });

                    if (Math.random() < 0.05) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height * 0.6;
                        const colors = ['255, 99, 71', '60, 179, 113', '100, 149, 237', '255, 215, 0', '255, 105, 180'];
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        createParticle(x, y, color);
                    }
                };

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', resize);
                resize();
                animate();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationId);
                };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[60] bg-transparent" />;
        };

        const ScoreBoard = ({ score }) => {
            const maxScore = 20;
            const lights = [...Array(maxScore)].map((_, i) => i);

            return (
                <div className="flex flex-col items-center animate-pop-in pointer-events-auto">
                    <div className="bg-[#fcfaf5] text-stone-600 text-[10px] md:text-xs px-1 py-1 rounded-t border-x border-t border-stone-300 font-bold tracking-widest whitespace-nowrap shadow-sm w-full text-center">
                        文采值
                    </div>
                    <div className="bg-[#fcfaf5]/90 backdrop-blur p-1 pb-1.5 rounded-b shadow-lg border border-stone-300 flex flex-col-reverse gap-[2px] w-full items-center">
                        {lights.map((i) => {
                            const isActive = i < score;
                            return (
                                <div 
                                    key={i}
                                    className={`w-4 h-1.5 md:w-5 md:h-2 rounded-[1px] transition-all duration-300 border border-stone-300
                                        ${isActive 
                                            ? 'bg-pink-400 shadow-[0_0_5px_#f472b6] border-pink-500' 
                                            : 'bg-stone-200 opacity-40'
                                        }
                                    `}
                                />
                            );
                        })}
                    </div>
                    <div className="mt-2 bg-[#fcfaf5] text-pink-500 font-mono text-xl md:text-2xl font-bold px-3 py-1 rounded border border-stone-300 shadow-inner">
                        {String(score).padStart(2, '0')}
                    </div>
                </div>
            );
        };

        const LuckyWheel = ({ onComplete, isActive }) => {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [result, setResult] = useState(null);
            const [isClosed, setIsClosed] = useState(false);

            const prizes = [
                { name: '牡蠣', color: '#f1f5f9', text: '#334155', score: 2, desc: '吃完牡蠣後用幽默的口吻叮囑兒子不要聲張，怕其他官員也跑來搶食，這顯示了他樂觀豁達的性格和對美食的熱愛。' },
                { name: '螃蟹', color: '#fee2e2', text: '#991b1b', score: 1, desc: '海南島四面環海，肥美的螃蟹是贈別的好禮。' },
                { name: '黎族釀酒', color: '#fef3c7', text: '#92400e', score: 1, desc: '「華夷兩樽合，醉笑一歡同。」東坡與黎族朋友共飲真一酒，不分漢夷，情感真摯。' },
                { name: '檳榔', color: '#dcfce7', text: '#166534', score: -2, desc: '初嘗幾口後，不久即吐之，全身發熱冒汗不適，過了幾個時辰才好。' }
            ];

            const spinToPrize = () => {
                if (isSpinning || result) return;
                setIsSpinning(true);
                const prizeIndex = Math.floor(Math.random() * 4);
                const segmentAngle = 360 / 4;
                const offset = segmentAngle / 2;
                const rotateAngle = 360 - (prizeIndex * segmentAngle + offset);
                const targetRotation = 1800 + rotateAngle; 
                setRotation(targetRotation);
                
                let spinTime = 0;
                const spinInterval = setInterval(() => {
                    spinTime += 100;
                    if (spinTime < 3800) { 
                        playSound('tick');
                    } else {
                        clearInterval(spinInterval);
                    }
                }, 150); 

                setTimeout(() => {
                    setIsSpinning(false);
                    const selectedPrize = prizes[prizeIndex];
                    setResult(selectedPrize);
                    if (selectedPrize.score > 0) playSound('correct');
                    else playSound('wrong');
                    onComplete(selectedPrize.score);
                }, 4000);
            };

            if (isClosed) return null;

            return (
                <div className={`fixed inset-0 z-[80] flex items-center justify-center bg-black/60 backdrop-blur-sm ${!isActive ? 'hidden' : ''}`}>
                    <div className="relative animate-pop-in flex flex-col items-center gap-5 bg-gradient-to-b from-[#fdfbf7] to-[#f4ecd8] p-6 md:p-8 rounded-2xl shadow-[0_15px_50px_rgba(0,0,0,0.5)] border-4 border-amber-700 w-[22rem] md:w-[26rem] max-h-[95vh] overflow-y-auto custom-scrollbar">
                        <h3 className="text-3xl font-bold text-amber-900 font-calligraphy drop-shadow-sm">轉盤抽好禮</h3>
                        
                        <div className="relative w-[220px] h-[220px] shrink-0">
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[24px] border-t-red-600 z-20 filter drop-shadow-md"></div>
                            
                            <div 
                                className="w-full h-full rounded-full border-[6px] border-amber-900 shadow-[0_4px_10px_rgba(0,0,0,0.3)] overflow-hidden transition-transform duration-[4000ms] ease-[cubic-bezier(0.17,0.67,0.12,0.99)]"
                                style={{ 
                                    transform: `rotate(${rotation}deg)`,
                                    background: `conic-gradient(${prizes[0].color} 0deg 90deg, ${prizes[1].color} 90deg 180deg, ${prizes[2].color} 180deg 270deg, ${prizes[3].color} 270deg 360deg)`
                                }}
                            >
                                {prizes.map((p, i) => (
                                    <div key={i} className="absolute top-0 left-0 w-full h-full flex justify-center pt-5 font-bold font-serif text-lg text-stone-800 drop-shadow-sm" style={{ transform: `rotate(${i * 90 + 45}deg)`, color: p.text }}>
                                        {p.name}
                                    </div>
                                ))}
                            </div>
                            
                            <button 
                                onClick={spinToPrize} 
                                disabled={isSpinning || result} 
                                className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-14 h-14 rounded-full border-[3px] border-amber-300 flex items-center justify-center text-white font-bold text-2xl shadow-[0_4px_10px_rgba(0,0,0,0.4)] z-30 transition-transform font-calligraphy ${result ? 'bg-stone-500 cursor-default' : 'bg-red-700 hover:bg-red-600 hover:scale-110 cursor-pointer active:scale-95'}`}
                            >
                                {result ? '完' : '按'}
                            </button>
                        </div>

                        {result ? (
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-amber-300 w-full animate-pop-in text-center mt-2">
                                <div className="text-xl font-bold mb-2 text-stone-800 font-calligraphy">獲得：{result.name}</div>
                                <p className="text-sm text-stone-600 leading-relaxed font-serif text-justify mb-3">{result.desc}</p>
                                <div className={`font-bold text-sm py-2 rounded mb-3 ${result.score > 0 ? 'text-green-700 bg-green-100' : 'text-red-600 bg-red-100'}`}>
                                    文采值 {result.score > 0 ? '+' : ''}{result.score} !
                                </div>
                                <button 
                                    onClick={() => setIsClosed(true)} 
                                    className="w-full bg-amber-700 text-white font-bold py-2.5 rounded-lg hover:bg-amber-800 transition-colors shadow-md text-base"
                                >
                                    收下並繼續
                                </button>
                            </div>
                        ) : (
                            <div className="bg-amber-900 text-amber-50 px-5 py-2.5 rounded-full text-sm font-bold shadow-md w-full text-center mt-2">
                                點擊中央「按」字抽取海南名產
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const RockPaperScissors = ({ onWin, onLose, isActive }) => {
            const [gameState, setGameState] = useState('start'); 
            const [playerChoice, setPlayerChoice] = useState(null);
            const [computerChoice, setComputerChoice] = useState(null);

            const choices = [
                { id: 'rock', icon: '✊', beats: 'scissors' },
                { id: 'paper', icon: '✋', beats: 'rock' },
                { id: 'scissors', icon: '✌️', beats: 'paper' }
            ];

            const playGame = (choiceId) => {
                if (gameState !== 'start') return;

                setPlayerChoice(choiceId);
                
                const playerChoiceObj = choices.find(c => c.id === choiceId);
                const choicePlayerBeats = playerChoiceObj.beats;
                const choicePlayerLosesTo = choices.find(c => c.beats === choiceId).id;
                
                let randomChoiceId;
                const rand = Math.random();
                if (rand < 0.6) {
                    randomChoiceId = choicePlayerBeats; // 玩家贏 60%
                } else if (rand < 0.8) {
                    randomChoiceId = choiceId; // 平手 20%
                } else {
                    randomChoiceId = choicePlayerLosesTo; // 玩家輸 20%
                }
                
                setComputerChoice(randomChoiceId);

                if (choiceId === randomChoiceId) {
                    setGameState('draw');
                } else if (playerChoiceObj.beats === randomChoiceId) {
                    setGameState('win');
                    playSound('win');
                } else {
                    setGameState('lose');
                    playSound('wrong');
                }
            };

            const resetRound = () => {
                setGameState('start');
                setPlayerChoice(null);
                setComputerChoice(null);
            };

            if (!isActive) return null;

            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/60 backdrop-blur-sm">
                    <div className="relative bg-gradient-to-br from-stone-800 to-stone-900 p-5 md:p-6 rounded-2xl shadow-[0_15px_50px_rgba(0,0,0,0.6)] border-4 border-red-900 w-[18rem] md:w-[24rem] text-center animate-pop-in max-h-[95vh] overflow-y-auto custom-scrollbar">
                        <h3 className="text-2xl md:text-3xl text-red-500 font-calligraphy mb-4 drop-shadow-md">⚠️ 路遇劫匪 ⚠️</h3>
                        
                        {gameState === 'start' && (
                            <>
                                <div className="bg-stone-950/50 p-3 rounded-lg border border-stone-700 mb-5 shadow-inner">
                                    <p className="text-stone-300 text-sm md:text-base font-serif">「此路是我開！想過此路，先贏過我手中的拳頭！」</p>
                                </div>
                                <div className="flex justify-center gap-3 md:gap-5">
                                    {choices.map(c => (
                                        <button 
                                            key={c.id} 
                                            onClick={() => playGame(c.id)} 
                                            className="w-16 h-16 md:w-20 md:h-20 text-3xl md:text-4xl bg-gradient-to-t from-stone-700 to-stone-600 hover:from-stone-600 hover:to-stone-500 flex items-center justify-center rounded-2xl transition-all transform hover:-translate-y-2 hover:shadow-[0_10px_20px_rgba(0,0,0,0.4)] active:scale-95 border-2 border-stone-500 shadow-lg"
                                        >
                                            {c.icon}
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}

                        {(gameState === 'win' || gameState === 'lose' || gameState === 'draw') && (
                            <div className="animate-pop-in">
                                <div className="flex justify-center items-center gap-6 md:gap-8 text-4xl md:text-5xl mb-6 bg-stone-950/40 p-4 rounded-2xl border border-stone-700 shadow-inner">
                                    <div className="text-center flex flex-col items-center">
                                        <span className="block text-xs font-bold text-stone-400 mb-2 bg-stone-800 px-2 py-0.5 rounded-full shadow-sm">你</span>
                                        <span className="drop-shadow-lg">{choices.find(c => c.id === playerChoice)?.icon}</span>
                                    </div>
                                    <div className="text-red-500 font-black text-2xl md:text-3xl italic drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">VS</div>
                                    <div className="text-center flex flex-col items-center">
                                        <span className="block text-xs font-bold text-stone-400 mb-2 bg-stone-800 px-2 py-0.5 rounded-full shadow-sm">劫匪</span>
                                        <span className="drop-shadow-lg">{choices.find(c => c.id === computerChoice)?.icon}</span>
                                    </div>
                                </div>
                                
                                {gameState === 'draw' && (
                                    <div className="bg-amber-900/40 border border-amber-700/50 p-4 rounded-xl">
                                        <p className="text-amber-400 text-lg md:text-xl font-bold mb-3">平手！再來一次！</p>
                                        <button onClick={resetRound} className="bg-amber-600 text-white px-6 py-2 text-base rounded-full font-bold hover:bg-amber-500 shadow-[0_0_15px_rgba(217,119,6,0.4)] transition-all">再戰</button>
                                    </div>
                                )}
                                {gameState === 'win' && (
                                    <div className="bg-green-900/40 border border-green-700/50 p-4 rounded-xl">
                                        <p className="text-green-400 text-lg md:text-xl font-bold mb-1">贏了！劫匪落荒而逃！</p>
                                        <p className="text-green-200/70 text-xs mb-4">文采值 +1 (壓驚)</p>
                                        <button onClick={onWin} className="bg-green-600 text-white px-6 py-2 text-base rounded-full font-bold hover:bg-green-500 shadow-[0_0_15px_rgba(22,163,74,0.4)] transition-all">繼續旅程</button>
                                    </div>
                                )}
                                {gameState === 'lose' && (
                                    <div className="bg-red-900/40 border border-red-700/50 p-4 rounded-xl">
                                        <p className="text-red-400 text-lg md:text-xl font-bold mb-1">輸了！盤纏被搶光...</p>
                                        <p className="text-red-200/70 text-xs mb-4">大俠請重新來過</p>
                                        <button onClick={onLose} className="bg-red-700 text-white px-6 py-2 text-base rounded-full font-bold hover:bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">重新開始</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 地點與測驗數據 (更新座標微調)
        const LOCATIONS = [
            { id: 'start', name: '起點', x: 90, y: 10, desc: '請上傳地圖並點擊「開始行旅」。蘇軾的一生，是詩意與苦難交織的旅程。', poem: '人生到處知何似，應似飛鴻踏雪泥。' },
            { id: 'mizhou', name: '密州', x: 63, y: 7, year: '1075-1076年 (40-41歲)', desc: '任密州知州。在此地文風大變，作風豪放。同時也寫下感人至深的悼亡詞。', poem: '會挽雕弓如滿月，西北望，射天狼。', quizzes: [
                { 
                    question: '「老夫聊發少年狂，左牽黃，右擎蒼...」在《江城子·密州出獵》中，蘇軾用「親射虎，看孫郎」的典故，展現了何種氣概？', 
                    options: ['感嘆年華老去，力不從心', '渴望建功立業，英武豪邁', '描寫田園狩獵的悠閒', '諷刺朝廷重文輕武'], 
                    answer: 1, 
                    explanation: '正確！詞中「會挽雕弓如滿月，西北望，射天狼」一句，將自己比作三國孫權，表達了渴望為國戍邊、抗擊敵人的豪情壯志。',
                    extraLearning: { title: '原文賞析：《江城子·密州出獵》', content: '老夫聊發少年狂，左牽黃，右擎蒼，錦帽貂裘，千騎卷平岡。\n為報傾城隨太守，親射虎，看孫郎。\n酒酣胸膽尚開張。鬢微霜，又何妨！\n持節雲中，何日遣馮唐？\n會挽雕弓如滿月，西北望，射天狼。\n\n【典故補充】\n孫郎即三國時代的孫權。據《三國志》記載，孫權曾騎馬射虎，雖然馬匹被老虎抓傷，但他臨危不亂，用雙戟擊退了老虎。蘇軾以此自比，展現武將般的豪放之氣。' }
                },
                { 
                    question: '「十年生死兩茫茫，不思量，自難忘。」這首名垂千古的悼亡詞，是蘇軾夢見誰之後所作？', 
                    options: ['弟弟蘇轍', '恩師歐陽脩', '亡妻王弗', '侍妾朝雲'], 
                    answer: 2, 
                    explanation: '答對了。這首詞寫得字字血淚，「相顧無言，惟有淚千行」，表達了對結髮妻子王弗深沉的思念與哀傷。',

                    extraLearning: { title: '原文賞析：《自題金山畫像》', content: '心似已灰之木，身如不繫之舟。\n問汝平生功業，黃州惠州儋州。\n\n【思辨延伸：苦難的禮物】\n如果一生順遂，他或許只是一位優秀的政治家，寫些歌功頌德的華麗文章。正是這三州接連不斷的打擊，逼迫他直視生命的本質，才造就了今天我們所敬仰的偉大文學家。' }
                },
                { 
                    question: '【思辨】蘇軾最後總結一生：「也無風雨也無晴」。如果用一個現代詞彙來形容這種境界，你認為最貼切的是？', 
                    options: ['躺平', '厭世', '和解', '奮鬥'], 
                    answer: 2, 
                    explanation: '【思辨解析】這是一種與自我、與世界、與命運的徹底「和解」。不再對抗風雨，也不再執著晴天，達到了內心真正的自由。',
                    extraLearning: { title: '文學總結：也無風雨也無晴', content: '「也無風雨也無晴」出自他在黃州寫的《定風波》。\n\n到了他生命的最後時刻，這句話成為了他整個人生哲學的最佳寫照。政治上的得意（晴）與失意（風雨），在他眼中都已化為過眼雲煙，他以一顆平靜從容的心，走完了波瀾壯闊的一生。' }
                }
            ]}
        ];

        function QuizCard({ quiz, onAnswer, isActive, hasNext, onNext, isLastOfGame, onFinishGame, onShowExtra }) {
            const [selected, setSelected] = useState(null);
            const [showResult, setShowResult] = useState(false);

            useEffect(() => {
                setSelected(null);
                setShowResult(false);
            }, [quiz]);

            if (!quiz || !isActive) return null;

            const handleSelect = (index) => {
                if (showResult) return;
                setSelected(index);
                setShowResult(true);
                if (index === quiz.answer) {
                    playSound('correct');
                    onAnswer(true);
                } else {
                    playSound('wrong');
                    onAnswer(false);
                }
            };

            return (
                <div className="absolute top-6 md:top-10 left-4 md:left-6 w-[18rem] md:w-[24rem] bg-[#fffdf5]/95 backdrop-blur-sm border-2 border-stone-400 rounded-lg shadow-xl overflow-hidden z-40 animate-pop-in font-serif flex flex-col max-h-[85%]">
                    <div className="bg-amber-100 px-4 py-2 border-b border-stone-300 flex justify-between items-center shrink-0">
                        <span className="font-bold text-stone-800 flex items-center gap-2 text-base md:text-lg">
                            <span>🎓</span> 東坡小學堂
                        </span>
                        <span className="text-xs text-stone-500">詩詞賞析</span>
                    </div>
                    <div className="p-3 md:p-5 overflow-y-auto custom-scrollbar flex-1">
                        <p className="text-stone-800 font-medium mb-4 text-sm md:text-base leading-relaxed text-justify">
                            {quiz.question}
                        </p>
                        <div className="space-y-2">
                            {quiz.options.map((option, idx) => {
                                let btnClass = "w-full text-left px-3 py-2 text-sm md:text-base rounded border transition-colors ";
                                if (!showResult) {
                                    btnClass += "border-stone-300 hover:bg-amber-50 cursor-pointer text-stone-700";
                                } else {
                                    if (idx === quiz.answer) {
                                        btnClass += "bg-green-100 border-green-500 text-green-800 font-bold shadow-sm";
                                    } else if (idx === selected && idx !== quiz.answer) {
                                        btnClass += "bg-red-100 border-red-500 text-red-800";
                                    } else {
                                        btnClass += "opacity-50 border-stone-200";
                                    }
                                }

                                return (
                                    <button 
                                        key={idx}
                                        onClick={() => handleSelect(idx)}
                                        disabled={showResult}
                                        className={btnClass}
                                    >
                                        {['A', 'B', 'C', 'D'][idx]}. {option}
                                    </button>
                                );
                            })}
                        </div>
                        
                        {/* 顯示答題結果區塊 */}
                        {showResult && (
                            <div className="mt-4 space-y-2">
                                <div className={`p-3 rounded text-xs md:text-sm leading-relaxed border shadow-inner ${selected === quiz.answer ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800'}`}>
                                    <strong className="block mb-1 text-sm md:text-base">{selected === quiz.answer ? '🎉 答對了！' : '💡 答案是：' + ['A','B','C','D'][quiz.answer]}</strong>
                                    {quiz.explanation}
                                </div>
                                
                                {/* 多學一點按鈕 */}
                                {quiz.extraLearning && selected === quiz.answer && (
                                    <button 
                                        onClick={() => onShowExtra(quiz.extraLearning)}
                                        className="w-full py-2.5 bg-indigo-600 text-indigo-50 rounded font-bold hover:bg-indigo-700 hover:shadow-lg transition-all shadow flex items-center justify-center gap-2 mt-3 text-sm md:text-base border border-indigo-800"
                                    >
                                        💡 多學一點
                                    </button>
                                )}

                                {hasNext && (
                                    <button 
                                        onClick={onNext}
                                        className="w-full py-2 bg-amber-600 text-white rounded font-bold hover:shadow-lg transition-all shadow flex items-center justify-center gap-1 mt-2 text-sm md:text-base"
                                    >
                                        下一題 ➜
                                    </button>
                                )}

                                {isLastOfGame && (
                                    <button 
                                        onClick={onFinishGame}
                                        className="w-full py-2 bg-gradient-to-r from-red-600 to-amber-600 text-white rounded font-bold hover:shadow-lg transition-all shadow flex items-center justify-center gap-1 mt-2 text-sm md:text-base"
                                    >
                                        ✨ 查看最終評價 ✨
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [introState, setIntroState] = useState('waiting');
            const [showWelcomeModal, setShowWelcomeModal] = useState(false);
            const bgmRef = useRef(null);
            const videoRef = useRef(null);

            const [bgImage, setBgImage] = useState('貶謫路線2.png');
            const [imageError, setImageError] = useState(false);
            const [step, setStep] = useState(0); 
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(3);
            const [showFinalResult, setShowFinalResult] = useState(false);
            
            const [isQuizAnswered, setIsQuizAnswered] = useState(false);
            const [isWheelDone, setIsWheelDone] = useState(false);
            
            // 控制「多學一點」知識補充視窗的狀態
            const [extraModal, setExtraModal] = useState(null);

            const fileInputRef = useRef(null);

            const startIntro = () => {
                if (videoRef.current) {
                    videoRef.current.play().catch(e => console.log("Video play blocked:", e));
                }
                if (bgmRef.current) {
                    bgmRef.current.play().catch(e => console.log("Audio play blocked:", e));
                }
                setIntroState('playing');
                // 如果视频加载失败，5秒后自动进入
                setTimeout(() => {
                    if (introState === 'playing') {
                        endIntro();
                    }
                }, 5000);
            };

            const endIntro = () => {
                setIntroState('finished');
                setShowWelcomeModal(true);
            };

            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setBgImage(e.target.result);
                        setImageError(false);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const nextStep = () => {
                if (step < LOCATIONS.length - 1) {
                    setStep(step + 1);
                    setQuizIndex(0);
                    setIsQuizAnswered(false);
                    setIsWheelDone(false);
                }
            };

            const prevStep = () => {
                if (step > 1) {
                    setStep(step - 1);
                    setQuizIndex(0);
                    setIsQuizAnswered(false);
                    setIsWheelDone(false);
                }
            };

            const resetGame = () => {
                setStep(0);
                setQuizIndex(0);
                setScore(3);
                setShowFinalResult(false);
                setIntroState('waiting');
                setShowWelcomeModal(false);
                setIsQuizAnswered(false);
                setIsWheelDone(false);
                setExtraModal(null);
                
                if (bgmRef.current) {
                    bgmRef.current.pause();
                    bgmRef.current.currentTime = 0;
                }
                if (videoRef.current) {
                    videoRef.current.pause();
                    videoRef.current.currentTime = 0;
                }
            };

            const startGame = () => {
                setStep(1);
                setQuizIndex(0);
                setScore(3);
                setShowFinalResult(false);
                setIsQuizAnswered(false);
                setIsWheelDone(false);
            };

            const nextQuiz = () => {
                setQuizIndex(prev => prev + 1);
                setIsQuizAnswered(false);
            };

            const handleAnswer = (isCorrect) => {
                if (isCorrect) {
                    setScore(prev => Math.min(prev + 1, 20)); 
                }
                setIsQuizAnswered(true); 
            };
            
            const handleWheelComplete = (points) => {
                setScore(prev => Math.max(0, Math.min(prev + points, 20)));
                setIsWheelDone(true); 
            };

            const handleRPSWin = () => {
                setScore(prev => Math.min(prev + 1, 20));
                nextStep();
            };

            const handleRPSLose = () => {
                setStep(0); 
                setQuizIndex(0);
                setScore(3);
                setIsQuizAnswered(false);
                setIsWheelDone(false);
            };

            const handleFinishGame = () => {
                setShowFinalResult(true);
                playSound('win');
            };

            const getFriendshipLevel = (score) => {
                if (score >= 20) return { level: "生死之交", poem: "竹杖芒鞋輕勝馬，誰怕？一蓑煙雨任平生。" };
                if (score >= 17) return { level: "莫逆之交", poem: "九死南荒吾不恨，茲遊奇絕冠平生。" };
                if (score >= 14) return { level: "金蘭之交", poem: "試問嶺南應不好，卻道：此心安處是吾鄉。" };
                if (score >= 10) return { level: "推心置腹", poem: "人有悲歡離合，月有陰晴圓缺，此事古難全。" };
                if (score >= 6) return { level: "泛泛之交", poem: "長恨此身非我有，何時忘卻營營。" };
                return { level: "一面之交", poem: "人生到處知何似，應似飛鴻踏雪泥。" };
            };

            const currentLocation = LOCATIONS[step];
            const currentQuiz = currentLocation.quizzes ? currentLocation.quizzes[quizIndex] : null;
            const hasNextQuiz = currentLocation.quizzes && quizIndex < currentLocation.quizzes.length - 1;
            const isLastOfGame = step === LOCATIONS.length - 1 && currentQuiz && (!hasNextQuiz);
            const friendship = getFriendshipLevel(score);

            let canNext = true;
            if (step > 0) {
                if (currentLocation.type === 'rps') {
                    canNext = false; 
                } else if (currentLocation.type === 'wheel') {
                    canNext = isWheelDone; 
                } else if (currentQuiz) {
                    canNext = isQuizAnswered && !hasNextQuiz; 
                }
            }

            let btnText = '下一站';
            if (step === 0) {
                btnText = '開始行旅';
            } else if (!canNext) {
                if (currentLocation.type === 'wheel') btnText = '請先抽獎';
                else if (currentQuiz) {
                    btnText = isQuizAnswered ? '請按下一題' : '請先答題';
                }
            }

            return (
                <div className="flex flex-col items-center min-h-screen py-2 px-2 md:py-4 md:px-6 bg-[#f0ebe5]">
                    
                    <audio ref={bgmRef} src="背景音樂.mp3" loop onError={() => console.log("背景音樂加載失敗")} />

                    {introState !== 'finished' && (
                        <div className="fixed inset-0 z-[100] bg-gradient-to-b from-slate-900 via-red-900 to-amber-900 flex flex-col items-center justify-center">
                            <video 
                                ref={videoRef}
                                src="東坡開場.mp4" 
                                playsInline
                                muted 
                                onEnded={endIntro}
                                onError={() => setTimeout(endIntro, 3000)}
                                className="w-full h-full object-contain absolute inset-0"
                            />
                            
                            <div className="absolute inset-0 bg-gradient-to-b from-slate-900/40 via-transparent to-red-900/40 flex flex-col items-start justify-start z-10 p-6 md:p-12">
                                <h1 className="text-4xl md:text-6xl font-calligraphy text-amber-100 drop-shadow-2xl mb-2 text-left">東坡行旅</h1>
                                <p className="text-lg md:text-xl text-amber-50/90 font-serif drop-shadow-lg text-left">一蓑煙雨任平生</p>
                            </div>
                            
                            {introState === 'waiting' && (
                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center z-[102] backdrop-blur-sm">
                                    <button 
                                        onClick={startIntro}
                                        className="bg-red-800 hover:bg-red-700 text-amber-50 px-8 py-4 rounded-full font-serif font-bold text-3xl shadow-[0_0_30px_rgba(153,27,27,0.6)] transition-all transform hover:scale-110 border-2 border-red-500"
                                    >
                                        開始體驗
                                    </button>
                                </div>
                            )}

                            {introState === 'playing' && (
                                <button 
                                    onClick={endIntro}
                                    className="absolute bottom-10 right-10 bg-stone-800/80 hover:bg-stone-700 text-white px-6 py-2 rounded-full font-serif border border-stone-500 transition-colors z-[101] shadow-lg text-lg"
                                >
                                    略過 ⏭
                                </button>
                            )}
                        </div>
                    )}

                    {/* 知識補充 Modal */}
                    {extraModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm">
                            <div className="bg-[#fcfaf5] p-6 md:p-8 rounded-xl shadow-2xl border-4 border-indigo-900 animate-pop-in text-center max-w-lg w-[90%] relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <h3 className="text-2xl md:text-3xl font-bold text-indigo-900 mb-4 font-calligraphy border-b-2 border-indigo-200 pb-2">
                                    {extraModal.title}
                                </h3>
                                <div className="text-stone-700 font-serif leading-relaxed text-left mb-6 text-sm md:text-base whitespace-pre-line bg-stone-100 p-4 rounded border border-stone-200 shadow-inner">
                                    {extraModal.content}
                                </div>
                                <button 
                                    onClick={() => setExtraModal(null)}
                                    className="w-full bg-indigo-700 text-white font-bold py-3 rounded-lg hover:bg-indigo-800 transition-colors shadow-md border border-indigo-900"
                                >
                                    閱讀完畢，繼續遊戲
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 最終結算視窗 - 已移除黑色半透明變暗背景，改為透明的毛玻璃效果 */}
                    {showFinalResult && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-transparent backdrop-blur-sm">
                            <Fireworks />
                            <div className="bg-[#fffdf5] p-8 rounded-xl shadow-2xl border-4 border-amber-500 animate-pop-in text-center w-[20rem] md:w-[28rem] max-h-[95vh] overflow-y-auto custom-scrollbar relative z-10">
                                <h2 className="text-2xl md:text-3xl font-bold text-stone-800 mb-4 font-calligraphy">旅程圓滿結束</h2>
                                <div className="text-5xl my-4">🎉</div>
                                <p className="text-stone-600 mb-3 text-base md:text-lg">您與東坡先生的文采共鳴度：</p>
                                <div className="text-4xl md:text-5xl font-bold text-red-600 mb-3 font-calligraphy drop-shadow-md">
                                    {friendship.level}
                                </div>
                                <p className="text-stone-500 text-sm md:text-base mb-5">最終文采值：{score}</p>
                                
                                <div className="bg-stone-100 p-3 rounded mb-6 border border-stone-200">
                                    <p className="font-calligraphy text-stone-700 text-xl md:text-2xl">「{friendship.poem}」</p>
                                </div>

                                <button 
                                    onClick={resetGame}
                                    className="bg-stone-800 text-amber-50 px-6 py-3 rounded-full font-bold hover:bg-stone-700 transition-colors shadow-lg w-full text-lg border-2 border-amber-500/30"
                                >
                                    重新遊歷
                                </button>
                                
                                <div className="mt-4 text-center text-stone-400 font-calligraphy text-sm drop-shadow-sm">
                                    南一書局 X 林威宇老師製作
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {showWelcomeModal && (
                        <div className="fixed inset-0 z-[90] bg-black/60 flex items-center justify-center backdrop-blur-sm">
                            <div className="bg-[#fffdf5] p-8 rounded-xl shadow-2xl border-4 border-stone-400 max-w-md w-[90%] text-center animate-pop-in">
                                <div className="text-4xl mb-4">📜</div>
                                <p className="text-stone-800 font-serif leading-relaxed text-lg mb-6">
                                    跟著蘇東坡遊歷大江南北，感受其生命體察後所創作的文學作品。
                                </p>
                                <button
                                    onClick={() => setShowWelcomeModal(false)}
                                    className="bg-red-800 text-white px-8 py-2 text-base rounded-full font-bold font-serif shadow-lg hover:bg-red-900 transition-colors border border-red-600"
                                >
                                    開始遊歷
                                </button>
                            </div>
                        </div>
                    )}

                    {step > 0 && (
                        <div className="w-[95vw] max-w-[1280px] mb-4 grid grid-cols-1 md:grid-cols-3 gap-4 animate-fade-in-up mx-auto z-10">
                            <div className={`md:col-span-1 bg-white p-4 md:p-5 rounded-lg shadow-md border-l-4 ${currentLocation.type === 'special' || currentLocation.type === 'wheel' || currentLocation.type === 'rps' ? 'border-purple-600' : 'border-red-800'} relative overflow-hidden`}>
                                <div className="absolute top-0 right-0 -mt-2 -mr-2 text-7xl md:text-8xl text-stone-100 font-calligraphy select-none z-0">
                                    {currentLocation.name[0]}
                                </div>
                                <div className="relative z-10">
                                    <div className="flex items-baseline gap-2 mb-2">
                                        <h2 className="text-2xl md:text-3xl font-bold text-stone-800 font-calligraphy">{currentLocation.name}</h2>
                                        <span className={`text-xs md:text-sm font-bold ${currentLocation.type === 'special' || currentLocation.type === 'wheel' || currentLocation.type === 'rps' ? 'text-purple-700 bg-purple-50' : 'text-red-700 bg-red-50'} px-2 py-0.5 rounded-full`}>{currentLocation.year}</span>
                                    </div>
                                    <p className="text-stone-700 text-sm md:text-base leading-relaxed text-justify">
                                        {currentLocation.desc}
                                    </p>
                                </div>
                            </div>

                            <div className="md:col-span-2 bg-stone-800 text-stone-200 p-5 md:p-6 rounded-lg shadow-md relative overflow-hidden">
                                <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/black-paper.png')]"></div>
                                <div className="relative z-10 flex flex-col h-full justify-center items-center text-center">
                                    <div className="mb-2 text-amber-500 text-xs md:text-sm tracking-[0.2em] uppercase border-b border-amber-500/30 pb-1">
                                        {currentLocation.type === 'special' || currentLocation.type === 'wheel' || currentLocation.type === 'rps' ? '軼聞趣事' : '東坡詩·詞·文選'}
                                    </div>
                                    <blockquote className="text-xl md:text-2xl font-calligraphy leading-loose text-white drop-shadow-md px-4">
                                        「{currentLocation.poem}」
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="relative w-[95vw] max-w-[1280px] bg-stone-200 rounded-xl shadow-2xl overflow-hidden border-4 border-stone-300 flex flex-col aspect-video mx-auto">
                        
                        {bgImage && !imageError ? (
                            <div className="relative w-full h-full">
                                <img 
                                    src={bgImage} 
                                    alt="地圖背景" 
                                    className="w-full h-full object-contain pointer-events-none select-none bg-[#e8e0d5]" 
                                    onError={() => setImageError(true)} 
                                />
                                
                                {step > 0 && (
                                    <>
                                        <div 
                                            className="absolute w-16 h-16 md:w-28 md:h-28 transition-all duration-1000 ease-in-out z-20 transform -translate-x-1/2 -translate-y-1/2 cursor-pointer hover:scale-110 drop-shadow-2xl flex items-center justify-center"
                                            style={{ left: `${currentLocation.x}%`, top: `${currentLocation.y}%` }}
                                        >
                                            <img 
                                                src="東坡小圖.png" 
                                                alt="東坡" 
                                                className="w-full h-full object-contain filter drop-shadow-md" 
                                                onError={(e) => {
                                                    e.target.style.display = 'none';
                                                    // 显示备用文字
                                                    e.target.parentElement.innerHTML = '<div class="text-3xl md:text-5xl">📜</div>';
                                                }}
                                            />
                                            <div className="absolute -bottom-6 md:-bottom-8 left-1/2 transform -translate-x-1/2 bg-white/90 px-2 py-0.5 md:py-1 rounded text-xs md:text-sm font-bold whitespace-nowrap shadow-sm border border-stone-400 text-stone-800">
                                                {currentLocation.name}
                                            </div>
                                        </div>
                                    </>
                                )}

                                {LOCATIONS.map((loc, index) => {
                                    if (index === 0) return null;
                                    const isActive = index === step;
                                    const isPast = index < step;
                                    const isSpecial = loc.type === 'special';
                                    const isWheel = loc.type === 'wheel';
                                    const isRPS = loc.type === 'rps';
                                    
                                    let markerClass = "";
                                    if (isActive) {
                                        markerClass = (isSpecial || isWheel || isRPS ? 'bg-purple-600 ring-purple-200' : 'bg-red-600 ring-red-200') + ' scale-150 ring-4 z-10';
                                    } else if (isPast) {
                                        markerClass = 'bg-stone-600 z-0';
                                    } else {
                                        markerClass = (isSpecial || isWheel || isRPS ? 'bg-purple-400 border-purple-400' : 'bg-transparent border-stone-400') + ' border opacity-50';
                                    }

                                    return (
                                        <div 
                                            key={loc.id}
                                            className={`absolute w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transform -translate-x-1/2 -translate-y-1/2 transition-colors duration-500 ${markerClass}`}
                                            style={{ left: `${loc.x}%`, top: `${loc.y}%` }}
                                        />
                                    );
                                })}

                                {step > 0 && currentQuiz && !currentLocation.type && (
                                    <QuizCard 
                                        key={currentLocation.id + quizIndex}
                                        quiz={currentQuiz} 
                                        isActive={!showFinalResult}
                                        onAnswer={handleAnswer}
                                        hasNext={hasNextQuiz} 
                                        onNext={nextQuiz}
                                        isLastOfGame={isLastOfGame} 
                                        onFinishGame={handleFinishGame}
                                        onShowExtra={setExtraModal}
                                    />
                                )}
                                
                                {step > 0 && currentLocation.type === 'special' && currentQuiz && (
                                    <QuizCard 
                                        key={currentLocation.id + quizIndex}
                                        quiz={currentQuiz} 
                                        isActive={true}
                                        onAnswer={handleAnswer}
                                        hasNext={hasNextQuiz}
                                        onNext={nextQuiz}
                                        onShowExtra={setExtraModal}
                                    />
                                )}
                                
                                {step > 0 && currentLocation.type === 'wheel' && (
                                    <LuckyWheel 
                                        key={currentLocation.id}
                                        isActive={true}
                                        onComplete={handleWheelComplete}
                                    />
                                )}

                                {step > 0 && currentLocation.type === 'rps' && (
                                    <RockPaperScissors
                                        key={currentLocation.id}
                                        isActive={true}
                                        onWin={handleRPSWin}
                                        onLose={handleRPSLose}
                                    />
                                )}

                                <div className="absolute top-1/2 -translate-y-1/2 right-4 md:right-8 flex flex-col items-center gap-6 z-30 pointer-events-none">
                                    <div className="pointer-events-auto">
                                        {step > 0 && <ScoreBoard score={score} />}
                                    </div>
                                    <div className="flex flex-col gap-3 w-[100px] md:w-[130px] pointer-events-auto">
                                        {step > 1 && currentLocation.type !== 'rps' && !showFinalResult && (
                                            <button onClick={prevStep} className="w-full px-4 py-2 bg-white/90 backdrop-blur text-stone-700 rounded-lg shadow-md hover:bg-white border border-stone-300 font-serif text-sm md:text-base whitespace-nowrap">
                                                上一站
                                            </button>
                                        )}
                                        {step < LOCATIONS.length - 1 && currentLocation.type !== 'rps' && (
                                            <button 
                                                onClick={step === 0 ? startGame : nextStep} 
                                                disabled={step > 0 && !canNext}
                                                className={`w-full px-4 py-3 rounded-lg shadow-md font-bold tracking-widest font-serif ring-2 text-sm md:text-base whitespace-nowrap transition-all ${
                                                    step > 0 && !canNext 
                                                    ? 'bg-stone-300 text-stone-500 ring-stone-300 cursor-not-allowed opacity-90' 
                                                    : 'bg-red-800 text-white hover:bg-red-900 ring-red-200'
                                                }`}
                                            >
                                                {btnText}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full w-full bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')]">
                                <div className="text-6xl mb-4 opacity-40">🗺️</div>
                                <h3 className="text-2xl md:text-3xl font-bold text-stone-700 mb-4">歡迎蒞臨</h3>
                                <p className="text-stone-600 mb-8 max-w-md text-center text-base leading-relaxed">上傳高清地圖圖片以獲得更佳體驗（可選）</p>
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="px-6 py-3 bg-stone-700 text-amber-50 rounded-lg shadow-lg hover:bg-stone-800 transition-colors font-bold flex items-center gap-2 text-lg"
                                >
                                    📤 上傳地圖圖片
                                </button>
                            </div>
                        )}
                        
                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                    </div>

                    <div className="text-center mt-6 mb-2 z-10">
                        <h1 className="text-3xl md:text-5xl font-calligraphy text-stone-800 mb-1 drop-shadow-sm">東坡行旅</h1>
                        <p className="text-stone-600 font-serif text-sm md:text-base">一蓑煙雨任平生：蘇軾貶謫路線互動圖</p>
                    </div>
                    
                    <footer className="w-full text-center py-4 text-stone-500 font-serif text-sm md:text-base mt-auto z-10">
                        南一書局 X 林威宇老師製作
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
